<svg viewBox="0 0 700 280" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>The infrastructure gap in AI</title>
  <desc>Model capability racing ahead while infrastructure lags behind, with the gap between them highlighted</desc>

  <defs>
    <linearGradient id="gapFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.04"/>
    </linearGradient>
  </defs>

  <!-- Grid lines -->
  <g stroke="#e5e5e5" stroke-width="0.5" opacity="0.5">
    <line x1="80" y1="40" x2="640" y2="40"/>
    <line x1="80" y1="90" x2="640" y2="90"/>
    <line x1="80" y1="140" x2="640" y2="140"/>
    <line x1="80" y1="190" x2="640" y2="190"/>
  </g>

  <!-- Y axis label -->
  <text x="16" y="120" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#737373" text-anchor="middle" transform="rotate(-90, 16, 120)" letter-spacing="0.05em">MATURITY</text>

  <!-- X axis labels -->
  <text x="140" y="235" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#737373" text-anchor="middle">2022</text>
  <text x="300" y="235" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#737373" text-anchor="middle">2024</text>
  <text x="460" y="235" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#737373" text-anchor="middle">2026</text>
  <text x="600" y="235" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#737373" text-anchor="middle">→</text>

  <!-- The gap area -->
  <path d="M 100,165 C 200,155 300,110 400,65 L 500,35 L 580,22 L 580,140 L 500,148 L 400,165 C 300,178 200,188 100,193 Z" fill="url(#gapFill)"/>

  <!-- Gap label -->
  <text x="420" y="108" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#ef4444" text-anchor="middle" font-weight="600" opacity="0.8">the gap</text>
  <text x="420" y="125" font-family="system-ui,-apple-system,sans-serif" font-size="10.5" fill="#ef4444" text-anchor="middle" opacity="0.6">this blog lives here</text>

  <!-- Model capability line -->
  <path d="M 100,165 C 200,155 300,110 400,65 Q 470,40 540,28 L 580,22" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="580" cy="22" r="4" fill="#3b82f6"/>

  <!-- Infrastructure line -->
  <path d="M 100,193 C 200,188 300,178 400,165 Q 470,155 540,148 L 580,140" fill="none" stroke="#737373" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="6,4"/>
  <circle cx="580" cy="140" r="4" fill="#737373"/>

  <!-- Legend -->
  <line x1="100" y1="262" x2="130" y2="262" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <text x="138" y="266" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#262626">Model capability</text>

  <line x1="300" y1="262" x2="330" y2="262" stroke="#737373" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="6,4"/>
  <text x="338" y="266" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#262626">Infrastructure</text>
</svg>
